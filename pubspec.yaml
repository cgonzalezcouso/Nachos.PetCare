name: nachos_pet_care_flutter
description: "NachosPetCare - Tu compañero para el cuidado de mascotas"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Supabase
  supabase_flutter: ^2.8.3

  # Autenticación Social
  google_sign_in: ^6.2.2

  # Base de datos local
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0

  # Estado y DI
  provider: ^6.1.2
  get_it: ^8.0.3

  # Navegación
  go_router: ^14.6.2

  # Utilidades
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

  # HTTP
  http: ^1.2.2
  dio: ^5.7.0

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

