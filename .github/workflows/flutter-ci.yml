name: 🐾 Flutter CI – NachosPetCare
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
jobs:
  # ─── Análisis y Tests ─────────────────────────────────────────────────
  flutter_test:
    name: 🧪 Análisis estático y Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: 🔐 Crear archivo secrets
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'EOF'
          // lib/config/secrets.dart
          // Generated by GitHub Actions workflow
          
          class AppSecrets {
            static const String supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const String supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          
          final appSecrets = AppSecrets();
          EOF
      
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: 📦 Instalar dependencias
        run: flutter pub get
      
      - name: 🔍 Análisis estático (flutter analyze)
        run: flutter analyze --no-fatal-infos
      
      - name: 🧪 Ejecutar tests unitarios
        run: flutter test --coverage
      
      - name: 📊 Subir cobertura a Codecov (opcional)
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
  
  # ─── Build Android ─────────────────────────────────────────────────────
  build_android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: flutter_test
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: 🔐 Crear archivo secrets
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'EOF'
          // lib/config/secrets.dart
          // Generated by GitHub Actions workflow
          
          class AppSecrets {
            static const String supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const String supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          
          final appSecrets = AppSecrets();
          EOF
      
      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: 📦 Instalar dependencias
        run: flutter pub get
      
      - name: 🏗️ Build APK (debug)
        run: flutter build apk --debug --verbose
      
      - name: 📤 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nachos-petcare-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
  
  # ─── Build iOS (Opcional, requiere macOS) ────────────────────────────
  build_ios:
    name: 🍎 Build iOS (Opcional)
    runs-on: macos-latest
    needs: flutter_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: 🔐 Crear archivo secrets
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'EOF'
          // lib/config/secrets.dart
          // Generated by GitHub Actions workflow
          
          class AppSecrets {
            static const String supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const String supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          
          final appSecrets = AppSecrets();
          EOF
      
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: 📦 Instalar dependencias
        run: flutter pub get
      
      - name: 🏗️ Build iOS (release)
        run: flutter build ios --release --no-codesign
      
      - name: 📤 Subir artefacto iOS
        uses: actions/upload-artifact@v4
        with:
          name: nachos-petcare-ios-${{ github.run_number }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 14
        continue-on-error: true
