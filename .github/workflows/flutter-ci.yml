name: 🐾 Flutter CI – NachosPetCare
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
jobs:
  # ─── Análisis y Tests ─────────────────────────────────────────────────
  flutter_test:
    name: 🧪 Análisis estático y Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      - name: 📦 Instalar dependencias
        run: flutter pub get
      - name: 🔍 Análisis estático (flutter analyze)
        run: flutter analyze --no-fatal-infos
      - name: 🧪 Ejecutar tests unitarios
        run: flutter test --coverage
      - name: 📊 Subir cobertura a Codecov (opcional)
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
  # ─── Build Android ─────────────────────────────────────────────────────
  build_android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: flutter_test
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: 📦 Instalar dependencias
        run: flutter pub get
      
      - name: 🏗️ Build APK (debug)
        run: flutter build apk --debug --verbose
      
      - name: 📤 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nachos-petcare-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
