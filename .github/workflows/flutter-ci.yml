name: 🐾 Flutter CI – NachosPetCare
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
jobs:
  # ─── Análisis y Tests ─────────────────────────────────────────────────
  flutter_test:
    name: 🧪 Análisis estático y Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: 🔐 Crear archivo Dart secrets
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'EOF'
          // lib/config/secrets.dart
          // Generated by GitHub Actions workflow
          
          class AppSecrets {
            static const String supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const String supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
            static const String googleWebClientId = '${{ secrets.GOOGLE_WEB_CLIENT_ID }}';
            static const String googleAndroidClientId = '${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}';
          }
          
          final appSecrets = AppSecrets();
          EOF
      
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: 📦 Instalar dependencias
        run: flutter pub get
      
      - name: 🔍 Análisis estático (flutter analyze)
        run: flutter analyze --no-fatal-infos
      
      - name: 🧪 Ejecutar tests unitarios
        run: flutter test --coverage
      
      - name: 📊 Subir cobertura a Codecov (opcional)
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
  
  # ─── Build Android ─────────────────────────────────────────────────────
  build_android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: flutter_test
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: 🔐 Crear archivo Dart secrets
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'EOF'
          // lib/config/secrets.dart
          // Generated by GitHub Actions workflow
          
          class AppSecrets {
            static const String supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const String supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
            static const String googleWebClientId = '${{ secrets.GOOGLE_WEB_CLIENT_ID }}';
            static const String googleAndroidClientId = '${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}';
          }
          
          final appSecrets = AppSecrets();
          EOF
      
      - name: 🔓 Crear google-services.json desde secret
        run: |
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      
      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: 📦 Instalar dependencias
        run: flutter pub get
      
      - name: 🏗️ Build APK (debug)
        run: flutter build apk --debug --verbose 2>&1 | tee build.log
        continue-on-error: true
      
      - name: 📋 Mostrar últimas líneas del log si falla
        if: failure()
        run: |
          if [ -f build.log ]; then
            echo "=== ÚLTIMOS 150 LÍNEAS DEL LOG ===" 
            tail -150 build.log
          else
            echo "No se encontró build.log"
          fi
      
      - name: 📤 Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nachos-petcare-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
      
      - name: 📤 Subir logs si existen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: build.log
          retention-days: 7
        continue-on-error: true
