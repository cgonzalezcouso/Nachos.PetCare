name: 🏷️ Auto-Label por Sprint / Milestone

on:
  issues:
    types: [milestoned, demilestoned]

jobs:
  auto_label:
    name: Asignar label según milestone
    runs-on: ubuntu-latest

    steps:
      - name: 🏷️ Auto-label basado en milestone
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue     = context.payload.issue;
            const milestone = issue.milestone;

            // Mapa: nombre del milestone → label del sprint
            const milestoneToLabel = {
              'Sprint 0': 'sprint-0',
              'Sprint 1': 'sprint-1',
              'Sprint 2': 'sprint-2',
              'Sprint 3': 'sprint-3',
              'Defensa':  'docs',
            };

            if (!milestone) {
              console.log('Issue sin milestone asignado. Nada que hacer.');
              return;
            }

            const label = milestoneToLabel[milestone.title];
            if (!label) {
              console.log(`Milestone '${milestone.title}' no tiene label mapeado.`);
              return;
            }

            // Obtener labels actuales del issue
            const currentLabels = issue.labels.map(l => l.name);

            // Eliminar labels de sprint anteriores para evitar duplicados
            const sprintLabels = ['sprint-0', 'sprint-1', 'sprint-2', 'sprint-3'];
            for (const sl of sprintLabels) {
              if (currentLabels.includes(sl) && sl !== label) {
                await github.rest.issues.removeLabel({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  name:         sl,
                }).catch(() => {});
              }
            }

            // Añadir el label correspondiente
            if (!currentLabels.includes(label)) {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                labels:       [label],
              });
              console.log(`✅ Label '${label}' añadido al issue #${issue.number}`);
            } else {
              console.log(`Label '${label}' ya estaba presente.`);
            }
